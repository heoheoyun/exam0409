<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="nav-brand" href="/">은행 시스템</a>
    <div class="nav-links">
        <a href="/">홈</a>
        <a href="#" onclick="logout()">로그아웃</a>
    </div>
</nav>

<div class="container">

    <div class="card">
        <h2>전체 회원 계좌 목록</h2>
        <button type="button" class="btn btn-primary" onclick="loadPage(currentPage)">새로고침</button>
        <br><br>
        <table>
            <thead>
                <tr>
                    <th>계좌 ID</th>
                    <th>회원 아이디</th>
                    <th>계좌번호</th>
                    <th>잔액</th>
                    <th>상태</th>
                    <th>동결 관리</th>
                </tr>
            </thead>
            <tbody id="accountList"></tbody>
        </table>
        <p class="total-balance">잔액 총합: <span id="totalBalance">-</span></p>
        <p id="freezeMessage"></p>

        <!-- 페이지네이션 -->
        <div id="pagination" class="pagination"></div>
    </div>

</div>

<script th:inline="javascript">
    let currentPage = 1;

    // 인증 헤더 반환
    function authHeader() {
        const token = localStorage.getItem('token');
        if (!token) return { 'Content-Type': 'application/json' };
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };
    }

    // 메시지 표시 (성공/실패)
    function showMessage(message, isSuccess) {
        const el = document.getElementById('freezeMessage');
        el.className = isSuccess ? 'msg-success' : 'msg-error';
        el.innerText = message;
    }

    // 페이지 로드
    function loadPage(page) {
        currentPage = page;
        fetch(`/api/admin/accounts/${page}`, { headers: authHeader() })
            .then(res => res.json())
            .then(data => {
                renderTable(data.accounts);
                renderPagination(data.pageHandler);
                document.getElementById('totalBalance').innerText = `${data.totalBalance.toLocaleString()}원`;
            });
    }

    // 테이블 렌더링
    function renderTable(accounts) {
        const tbody = document.getElementById('accountList');
        tbody.innerHTML = '';
        accounts.forEach(a => {
            const badge = a.frozen
                ? '<span class="badge-frozen">동결</span>'
                : '<span class="badge-normal">정상</span>';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${a.accountId}</td>
                <td>${a.username}</td>
                <td>${a.accountNumber}</td>
                <td>${a.balance.toLocaleString()}원</td>
                <td>${badge}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="freeze(${a.accountId})">동결</button>
                    <button class="btn btn-success btn-sm" onclick="unfreeze(${a.accountId})">해제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 페이지네이션 렌더링
    function renderPagination(ph) {
        const div = document.getElementById('pagination');
        div.innerHTML = '';

        if (ph.totalPage <= 1) return;

        if (ph.showPrev) {
            const a = document.createElement('a');
            a.href = '#';
            a.innerText = '<<';
            a.onclick = () => loadPage(ph.beginPage - 1);
            div.appendChild(a);
        }

        for (let i = ph.beginPage; i <= ph.endPage; i++) {
            if (i === ph.page) {
                const strong = document.createElement('strong');
                strong.innerText = i;
                div.appendChild(strong);
            } else {
                const a = document.createElement('a');
                a.href = '#';
                a.innerText = i;
                a.onclick = (function(page) {
                    return () => loadPage(page);
                })(i);
                div.appendChild(a);
            }
        }

        if (ph.showNext) {
            const a = document.createElement('a');
            a.href = '#';
            a.innerText = '>>';
            a.onclick = () => loadPage(ph.endPage + 1);
            div.appendChild(a);
        }
    }

    // 계좌 동결
    function freeze(accountId) {
        fetch(`/api/admin/account/${accountId}/freeze`, {
            method: 'POST',
            headers: authHeader()
        })
        .then(res => {
            if (res.ok) {
                showMessage('동결이 완료되었습니다.', true);
                loadPage(currentPage);
            } else {
                showMessage('동결에 실패했습니다.', false);
            }
        });
    }

    // 계좌 동결 해제
    function unfreeze(accountId) {
        fetch(`/api/admin/account/${accountId}/unfreeze`, {
            method: 'POST',
            headers: authHeader()
        })
        .then(res => {
            if (res.ok) {
                showMessage('동결이 해제되었습니다.', true);
                loadPage(currentPage);
            } else {
                showMessage('동결 해제에 실패했습니다.', false);
            }
        });
    }

    // 로그아웃
    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }

    loadPage(1);
</script>

</body>
</html>
