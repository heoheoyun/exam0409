<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="nav-brand" href="/">은행 시스템</a>
    <div class="nav-links">
        <a href="/">홈</a>
        <a href="#" onclick="logout()">로그아웃</a>
    </div>
</nav>

<div class="container">

    <!-- 전체 회원 계좌 목록 -->
    <div class="card">
        <h2>전체 회원 계좌 목록</h2>
        <button type="button" class="btn btn-primary" onclick="getAllAccounts()">새로고침</button>
        <br><br>
        <table>
            <thead>
                <tr>
                    <th>계좌 ID</th>
                    <th>회원 아이디</th>
                    <th>계좌번호</th>
                    <th>잔액</th>
                    <th>상태</th>
                    <th>동결 관리</th>
                </tr>
            </thead>
            <tbody id="accountList"></tbody>
        </table>
        <p class="total-balance">잔액 총합: <span id="totalBalance">-</span></p>
        <p id="freezeMessage" class="msg-success"></p>
    </div>

</div>

<script th:inline="javascript">
    function authHeader() {
        const token = localStorage.getItem('token');
        if (!token) return { 'Content-Type': 'application/json' };
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        };
    }

    function getAllAccounts() {
        fetch('/api/admin/accounts', { headers: authHeader() })
        .then(res => res.json())
        .then(list => {
            const tbody = document.getElementById('accountList');
            tbody.innerHTML = '';
            let total = 0;
            list.forEach(a => {
                const tr = document.createElement('tr');
                const badge = a.frozen
                    ? '<span class="badge-frozen">동결</span>'
                    : '<span class="badge-normal">정상</span>';
                tr.innerHTML = '<td>' + a.accountId + '</td>'
                             + '<td>' + a.username + '</td>'
                             + '<td>' + a.accountNumber + '</td>'
                             + '<td>' + a.balance.toLocaleString() + '원</td>'
                             + '<td>' + badge + '</td>'
                             + '<td>'
                             + '<button class="btn btn-danger btn-sm" onclick="freeze(' + a.accountId + ')">동결</button> '
                             + '<button class="btn btn-success btn-sm" onclick="unfreeze(' + a.accountId + ')">해제</button>'
                             + '</td>';
                tbody.appendChild(tr);
                total += a.balance;
            });
            document.getElementById('totalBalance').innerText = total.toLocaleString() + '원';
        });
    }

    function freeze(accountId) {
        fetch('/api/admin/account/' + accountId + '/freeze', {
            method: 'POST',
            headers: authHeader()
        })
        .then(res => {
            const msg = document.getElementById('freezeMessage');
            if (res.ok) {
                msg.className = 'msg-success';
                msg.innerText = '동결 완료';
                getAllAccounts();
            } else {
                msg.className = 'msg-error';
                msg.innerText = '동결에 실패했습니다.';
            }
        });
    }

    function unfreeze(accountId) {
        fetch('/api/admin/account/' + accountId + '/unfreeze', {
            method: 'POST',
            headers: authHeader()
        })
        .then(res => {
            const msg = document.getElementById('freezeMessage');
            if (res.ok) {
                msg.className = 'msg-success';
                msg.innerText = '동결 해제 완료';
                getAllAccounts();
            } else {
                msg.className = 'msg-error';
                msg.innerText = '동결 해제에 실패했습니다.';
            }
        });
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }

    getAllAccounts();
</script>

</body>
</html>
