<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>은행 시스템</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="nav-brand" href="/">은행 시스템</a>
</nav>

<div class="home-wrapper">
    <div class="home-card">
        <h1>은행 시스템</h1>

        <div id="guestMenu">
            <a href="/login" class="btn btn-primary">로그인</a>
            <a href="/register" class="btn btn-primary">회원가입</a>
        </div>

        <div id="userMenu" style="display:none">
            <a href="/banking" class="btn btn-primary">뱅킹 서비스</a>
            <a href="#" onclick="logout()" class="btn btn-danger">로그아웃</a>
        </div>

        <div id="adminMenu" style="display:none">
            <a href="/admin" class="btn btn-primary">관리자 페이지</a>
            <a href="#" onclick="logout()" class="btn btn-danger">로그아웃</a>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 토큰이 있으면 role에 따라 메뉴 표시
    const token = localStorage.getItem('token');
    if (token) {
        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('guestMenu').style.display = 'none';
        if (payload.role === 'ADMIN') {
            document.getElementById('adminMenu').style.display = 'block';
        } else {
            document.getElementById('userMenu').style.display = 'block';
        }
    }

    // 로그아웃
    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }
</script>

</body>
</html>
