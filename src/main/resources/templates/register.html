<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
</head>
<body>

	<a href="/">홈</a> |
	<a href="/login">로그인</a>

	<h1>회원가입</h1>

	<p id="message" style="color: red"></p>

	<form id="registerForm">
		<div>
			<label>아이디: </label> <input type="text" id="username"
				placeholder="아이디 입력">
		</div>
		<div>
			<label>비밀번호: </label> <input type="password" id="password"
				placeholder="비밀번호 입력">
		</div>
		<div>
			<label>이름: </label> <input type="text" id="name" placeholder="이름 입력">
		</div>
		<div>
			<label>역할: </label> <select id="role">
				<option value="USER">일반 회원</option>
				<option value="ADMIN">관리자</option>
			</select>
		</div>
		<br>
		<button type="button" onclick="register()">회원가입</button>
	</form>

	<script>
    function register() {
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            name: document.getElementById('name').value,
            role: document.getElementById('role').value
        };

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if (!res.ok) {
                document.getElementById('message').innerText = '이미 사용 중인 아이디입니다.';
                return;
            }
            window.location.href = '/login';
        });
    }
</script>

</body>
</html>
