<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="nav-brand" href="/">은행 시스템</a>
    <div class="nav-links">
        <a href="/login">로그인</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>회원가입</h1>

        <p id="message" class="msg-error"></p>

        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="username" placeholder="아이디 입력">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호 입력">
        </div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="name" placeholder="이름 입력">
        </div>
        <div class="form-group">
            <label>역할</label>
            <select id="role">
                <option value="USER">일반 회원</option>
                <option value="ADMIN">관리자</option>
            </select>
        </div>
        <button type="button" class="btn btn-primary" onclick="register()">회원가입</button>

        <div class="auth-footer">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 회원가입 - 성공 시 로그인 페이지로 이동
    function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, name, role })
        })
        .then(res => {
            if (!res.ok) {
                document.getElementById('message').innerText = '이미 사용 중인 아이디입니다.';
                return;
            }
            window.location.href = '/login';
        });
    }
</script>

</body>
</html>
