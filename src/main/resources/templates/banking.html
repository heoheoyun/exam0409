<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>뱅킹 서비스</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="nav-brand" href="/">은행 시스템</a>
    <div class="nav-links">
        <a href="/">홈</a>
        <a href="#" onclick="logout()">로그아웃</a>
    </div>
</nav>

<div class="container">

    <!-- 내 계좌 조회 -->
    <div class="card">
        <h2>내 계좌 조회</h2>
        <div id="accountInfo" class="account-info">
            <span>계좌번호:</span> <span id="accountNumber">-</span><br>
            <span>잔액:</span> <span id="balance">-</span>
        </div>
        <br>
        <button type="button" class="btn btn-primary" onclick="getAccount()">새로고침</button>
    </div>

    <!-- 입금 -->
    <div class="card">
        <h2>입금</h2>
        <div class="form-inline">
            <input type="number" id="depositAmount" placeholder="입금액 입력">
            <button type="button" class="btn btn-success" onclick="deposit()">입금</button>
        </div>
        <p id="depositMessage" class="msg-error"></p>
    </div>

    <!-- 송금 -->
    <div class="card">
        <h2>송금</h2>
        <div class="form-group">
            <label>수신 계좌번호</label>
            <input type="text" id="receiverAccount" placeholder="계좌번호 입력">
        </div>
        <div class="form-inline">
            <input type="number" id="transferAmount" placeholder="송금액 입력">
            <button type="button" class="btn btn-primary" onclick="transfer()">송금</button>
        </div>
        <p id="transferMessage" class="msg-error"></p>
    </div>

    <!-- 거래 내역 -->
    <div class="card">
        <h2>최근 거래 내역 (최근 5건)</h2>
        <button type="button" class="btn btn-primary" onclick="getHistory()">조회</button>
        <br><br>
        <ul id="historyList" class="history-list"></ul>
    </div>

</div>

<script th:inline="javascript">
    function authHeader() {
        const token = localStorage.getItem('token');
        if (!token) return { 'Content-Type': 'application/json' };
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        };
    }

    function getAccount() {
        fetch('/api/banking/account', { headers: authHeader() })
        .then(res => res.json())
        .then(data => {
            document.getElementById('accountNumber').innerText = data.accountNumber;
            document.getElementById('balance').innerText = data.balance.toLocaleString() + '원';
        });
    }

    function deposit() {
        const data = { amount: Number(document.getElementById('depositAmount').value) };
        fetch('/api/banking/deposit', {
            method: 'POST',
            headers: authHeader(),
            body: JSON.stringify(data)
        })
        .then(res => {
            if (res.ok) {
                document.getElementById('depositMessage').innerText = '';
                document.getElementById('depositAmount').value = '';
                getAccount();
            } else if (res.status === 401) {
                document.getElementById('depositMessage').innerText = '로그인이 필요합니다.';
            } else {
                document.getElementById('depositMessage').innerText = '입금에 실패했습니다.';
            }
        });
    }

    function transfer() {
        const data = {
            receiverAccountNumber: document.getElementById('receiverAccount').value,
            amount: Number(document.getElementById('transferAmount').value)
        };
        fetch('/api/banking/transfer', {
            method: 'POST',
            headers: authHeader(),
            body: JSON.stringify(data)
        })
        .then(res => {
            if (res.ok) {
                document.getElementById('transferMessage').innerText = '';
                document.getElementById('receiverAccount').value = '';
                document.getElementById('transferAmount').value = '';
                getAccount();
            } else if (res.status === 401) {
                document.getElementById('transferMessage').innerText = '로그인이 필요합니다.';
            } else {
                res.text().then(msg => {
                    if (msg.includes('잔액')) {
                        document.getElementById('transferMessage').innerText = '잔액이 부족합니다.';
                    } else if (msg.includes('동결')) {
                        document.getElementById('transferMessage').innerText = '동결된 계좌입니다.';
                    } else if (msg.includes('계좌번호')) {
                        document.getElementById('transferMessage').innerText = '존재하지 않는 계좌번호입니다.';
                    } else {
                        document.getElementById('transferMessage').innerText = '송금에 실패했습니다.';
                    }
                });
            }
        });
    }

    function getHistory() {
        fetch('/api/banking/history', { headers: authHeader() })
        .then(res => res.json())
        .then(list => {
            const ul = document.getElementById('historyList');
            ul.innerHTML = '';
            if (list.length === 0) {
                ul.innerHTML = '<li>거래 내역이 없습니다.</li>';
                return;
            }
            list.forEach(tx => {
                const li = document.createElement('li');
                li.innerText = '[' + tx.type + '] ' + tx.amount.toLocaleString() + '원 | '
                    + '보낸계좌: ' + (tx.senderAccountNumber || '외부') + ' → '
                    + '받은계좌: ' + tx.receiverAccountNumber + ' | '
                    + tx.createdAt;
                ul.appendChild(li);
            });
        });
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }

    getAccount();
</script>

</body>
</html>
