<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="nav-brand" href="/">은행 시스템</a>
    <div class="nav-links">
        <a href="/register">회원가입</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>로그인</h1>

        <p id="message" class="msg-error"></p>

        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="username" placeholder="아이디 입력">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호 입력">
        </div>
        <button type="button" class="btn btn-primary" onclick="login()">로그인</button>

        <div class="auth-footer">
            계정이 없으신가요? <a href="/register">회원가입</a>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 로그인 - 성공 시 role에 따라 페이지 이동
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => {
            if (!res.ok) {
                document.getElementById('message').innerText = '아이디 또는 비밀번호를 확인해주세요.';
                return;
            }
            return res.json();
        })
        .then(data => {
            if (!data) return;
            localStorage.setItem('token', data.accessToken);
            const payload = JSON.parse(atob(data.accessToken.split('.')[1]));
            window.location.href = payload.role === 'ADMIN' ? '/admin' : '/banking';
        });
    }
</script>

</body>
</html>
