<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>로그인</title>
</head>
<body>

	<a href="/">홈</a> |
	<a href="/register">회원가입</a>

	<h1>로그인</h1>

	<p id="message" style="color: red"></p>

	<form id="loginForm">
		<div>
			<label>아이디: </label> <input type="text" id="username"
				placeholder="아이디 입력">
		</div>
		<div>
			<label>비밀번호: </label> <input type="password" id="password"
				placeholder="비밀번호 입력">
		</div>
		<br>
		<button type="button" onclick="login()">로그인</button>
	</form>

	<script>
    function login() {
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if (!res.ok) {
                document.getElementById('message').innerText = '아이디 또는 비밀번호를 확인해주세요.';
                return;
            }
            return res.json();
        })
        .then(data => {
            if (!data) return;
            localStorage.setItem('token', data.accessToken);
            const payload = JSON.parse(atob(data.accessToken.split('.')[1]));
            window.location.href = payload.role === 'ADMIN' ? '/admin' : '/banking';
        });
    }
</script>

</body>
</html>
